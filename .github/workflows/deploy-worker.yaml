name: Deploy Auth Callback Worker
on:
  push:
    branches: [main]
    paths: ['web/auth-callback/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: web/auth-callback
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
