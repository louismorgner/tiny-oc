version: 2

builds:
  - binary: toc
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/tiny-oc/toc/cmd.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "toc_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: louismorgner
    name: tiny-oc
