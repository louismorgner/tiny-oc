name: slack
description: Slack API — messaging, channels, reactions, and search (user token)
auth:
  method: oauth2
  setup_url: https://api.slack.com/apps
  user_scopes:
    - channels:read
    - groups:read
    - im:read
    - mpim:read
    - channels:history
    - groups:history
    - im:history
    - mpim:history
    - chat:write
    - reactions:write
    - search:read
  setup_instructions: |
    1. Go to https://api.slack.com/apps and sign in
    2. Click "Create New App" → "From scratch" (or select an existing app)
    3. Go to "OAuth & Permissions" in the sidebar
    4. Under "Redirect URLs", add: https://toc-auth-callback.dev-f64.workers.dev/slack/callback
    5. Note your Client ID and Client Secret from "Basic Information"
    6. Run `toc integrate add slack` and paste them when prompted

capabilities:
  post:
    description: Send messages to Slack conversations
    actions:
      - send_message
  read:
    description: Read message history from Slack conversations
    actions:
      - read_messages
  react:
    description: Add emoji reactions in Slack conversations
    actions:
      - react
  discover:
    description: List Slack conversations visible to the installed identity
    actions:
      - list_channels
  search:
    description: Search messages across everything the installed identity can search
    actions:
      - search_messages

actions:
  send_message:
    description: Send a message to an existing Slack conversation (posted as you, not a bot)
    scopes:
      "*": any visible conversation
      "#name": one named channel
      "id/C123": one exact Slack conversation ID
      "channels/*": any public or private channel
      "dm/*": any existing direct message
      "mpim/*": any existing group direct message
    params:
      - name: channel
        required: true
      - name: text
        required: true
    method: POST
    endpoint: https://slack.com/api/chat.postMessage
    auth_header: "Bearer {{token}}"
    body_format: json
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - channel
      - ts
      - message.text
      - message.user

  read_messages:
    description: Read message history from a visible Slack conversation
    scopes:
      "*": any visible conversation
      "#name": one named channel
      "id/C123": one exact Slack conversation ID
      "channels/*": any public or private channel
      "dm/*": any existing direct message
      "mpim/*": any existing group direct message
    params:
      - name: channel
        required: true
      - name: limit
        required: false
        default: "20"
    method: GET
    endpoint: https://slack.com/api/conversations.history
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 30
      window: 60s
    returns:
      - ok
      - messages[].text
      - messages[].user
      - messages[].ts
      - messages[].type

  search_messages:
    description: Search messages across all channels the user has access to
    scopes:
      "*": all searchable messages visible to the installed identity
    params:
      - name: query
        required: true
      - name: count
        required: false
        default: "20"
      - name: sort
        required: false
        default: timestamp
      - name: sort_dir
        required: false
        default: desc
    method: GET
    endpoint: https://slack.com/api/search.messages
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - messages.total
      - messages.matches[].text
      - messages.matches[].username
      - messages.matches[].ts
      - messages.matches[].channel.name

  list_channels:
    description: List Slack conversations visible to the installed identity
    scopes:
      "*": all visible conversations
      "public/*": any public channel
      "private/*": any private channel
      "channels/*": any public or private channel
      "dm/*": any existing direct message
      "mpim/*": any existing group direct message
      "conversations/*": any visible conversation
    params:
      - name: limit
        required: false
        default: "100"
      - name: types
        required: false
        default: public_channel,private_channel,im,mpim
    method: GET
    endpoint: https://slack.com/api/conversations.list
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - channels[].id
      - channels[].name
      - channels[].is_channel
      - channels[].is_private
      - channels[].is_im
      - channels[].is_mpim
      - channels[].num_members

  react:
    description: Add an emoji reaction to a message in a visible Slack conversation
    scopes:
      "*": any visible conversation
      "#name": one named channel
      "id/C123": one exact Slack conversation ID
      "channels/*": any public or private channel
      "dm/*": any existing direct message
      "mpim/*": any existing group direct message
    params:
      - name: channel
        required: true
      - name: timestamp
        required: true
      - name: name
        required: true
    method: POST
    endpoint: https://slack.com/api/reactions.add
    auth_header: "Bearer {{token}}"
    body_format: json
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
