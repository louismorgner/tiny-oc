name: slack
description: Slack API — messaging, channels, reactions, and search (user token)
auth:
  method: oauth2
  setup_url: https://api.slack.com/apps
  user_scopes:
    - channels:read
    - channels:history
    - chat:write
    - reactions:write
    - search:read
  setup_instructions: |
    1. Go to https://api.slack.com/apps and sign in
    2. Click "Create New App" → "From scratch" (or select an existing app)
    3. Go to "OAuth & Permissions" in the sidebar
    4. Under "Redirect URLs", add: https://toc.opencompany.cloud/slack/callback
    5. Note your Client ID and Client Secret from "Basic Information"
    6. Run `toc integrate add slack` and paste them when prompted

actions:
  send_message:
    description: Send a message to a channel or DM (posted as you, not a bot)
    scopes:
      "*": any channel or DM
      dm: direct messages only
    params:
      - name: channel
        required: true
      - name: text
        required: true
    method: POST
    endpoint: https://slack.com/api/chat.postMessage
    auth_header: "Bearer {{token}}"
    body_format: json
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - channel
      - ts
      - message.text
      - message.user

  read_messages:
    description: Read message history from a channel
    scopes:
      "*": any channel
    params:
      - name: channel
        required: true
      - name: limit
        required: false
        default: "20"
    method: GET
    endpoint: https://slack.com/api/conversations.history
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 30
      window: 60s
    returns:
      - ok
      - messages[].text
      - messages[].user
      - messages[].ts
      - messages[].type

  search_messages:
    description: Search messages across all channels the user has access to
    scopes:
      "*": all accessible channels
    params:
      - name: query
        required: true
      - name: count
        required: false
        default: "20"
      - name: sort
        required: false
        default: timestamp
      - name: sort_dir
        required: false
        default: desc
    method: GET
    endpoint: https://slack.com/api/search.messages
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - messages.total
      - messages.matches[].text
      - messages.matches[].username
      - messages.matches[].ts
      - messages.matches[].channel.name

  list_channels:
    description: List public channels in the workspace
    scopes:
      "*": all channels
    params:
      - name: limit
        required: false
        default: "100"
      - name: types
        required: false
        default: public_channel
    method: GET
    endpoint: https://slack.com/api/conversations.list
    auth_header: "Bearer {{token}}"
    body_format: query
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
      - channels[].id
      - channels[].name
      - channels[].is_channel
      - channels[].num_members

  react:
    description: Add an emoji reaction to a message
    scopes:
      "*": any channel
    params:
      - name: channel
        required: true
      - name: timestamp
        required: true
      - name: name
        required: true
    method: POST
    endpoint: https://slack.com/api/reactions.add
    auth_header: "Bearer {{token}}"
    body_format: json
    rate_limit:
      max: 20
      window: 60s
    returns:
      - ok
